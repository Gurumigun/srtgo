services:
  gluetun:
    image: qmcgaw/gluetun
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    network_mode: host
    environment:
      - VPN_SERVICE_PROVIDER=nordvpn
      - VPN_TYPE=openvpn
      - OPENVPN_USER=${NORDVPN_USER}
      - OPENVPN_PASSWORD=${NORDVPN_PASS}
      - OPENVPN_PROTOCOL=tcp
      - SERVER_COUNTRIES=South Korea
      - FIREWALL=off
      - SOCKS5=on
      - SOCKS5_ADDRESS=:1080
      - HTTP_CONTROL_SERVER_ADDRESS=:8000
    restart: unless-stopped

  srtgo-bot:
    build: .
    container_name: srtgo-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - bot-data:/app/data
    environment:
      - SRTGO_DB_PATH=/app/data/srtgo.db
    dns:
      - 8.8.8.8
      - 8.8.4.4
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  bot-data:
